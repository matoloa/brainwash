name: Build linux appimage with cx_Freeze

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04] # build on old for compatibility, devcontainer was set up to be ubuntu 22.04 with py 3.12 to be similar
        #, windows-latest]
        python-version: ["3.12"]

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Install uv (also installs the pinned Python version)
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          python-version: ${{ matrix.python-version }}

      # Jonathan's addition from Grok
      - name: List files
        run: ls -la

      # Install dependencies (runtime + build tools)
      - name: Install dependencies
        run: uv sync --frozen --group build

      # Install patchelf on Linux (required for cx_Freeze)
      - name: Install patchelf (Linux)
        run: sudo apt-get update && sudo apt-get install -y patchelf

      # Clean stale build trees (partial builds leave a 'brainwash' file that
      # collides with include_files destinations on re-run).
      - name: Clean previous cx_Freeze output
        working-directory: ./src
        run: rm -rf build dist

      # Build the executable (tee so GitHub Actions log shows the real error;
      # pipefail so a failed freeze fails the step, not only tee succeeding).
      - name: Build with cx_Freeze
        working-directory: ./src
        run: |
          set -o pipefail
          uv run python build_with_cxfreeze_multiarch_setup.py bdist_appimage 2>&1 | tee cxbuild_appimage.log

      # Note (v0.16+): bw_cfg.yaml now uses XDG ~/.config/brainwash/ or portable
      # <AppImage>.config/ sibling (see docs/build.md). No longer written inside
      # the read-only AppImage squashfs.
      - name: List files for debugging
        if: always()
        run: |
          ls -la src/dist/ || echo "src/dist/ not found"
          ls -la src/build/ || echo "src/build/ not found"
          tail -n 80 src/cxbuild_appimage.log || true
        shell: bash

        # Extract version from pyproject.toml
      - name: Extract version from pyproject.toml
        run: |
          VERSION=$(uv run python -c "import toml; print(toml.load('pyproject.toml')['project']['version'])")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
        shell: bash

      # Upload artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: brainwash-${{ env.VERSION }}-x86_64.AppImage
          path: src/dist/
          compression-level: 0 # Disable compression
