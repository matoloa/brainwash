name: Test

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pytest:
    name: pytest src/lib
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          python-version: "3.12"

      - name: Install dev dependencies
        run: uv sync --frozen --group dev

      - name: Run tests
        run: uv run pytest src/lib/ -q