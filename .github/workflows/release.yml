name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen --group build

      - name: Extract version from pyproject.toml
        run: |
          VERSION=$(uv run python -c "import toml; print(toml.load('pyproject.toml')['project']['version'])")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Extracted version: $VERSION"

      - name: Install patchelf (Linux)
        run: sudo apt-get update && sudo apt-get install -y patchelf

      - name: Build with cx_Freeze
        working-directory: ./src
        run: uv run python build_with_cxfreeze_multiarch_setup.py bdist_appimage

      - name: Set artifact name
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "LINUX_ARTIFACT_NAME=brainwash-${{ github.ref_name }}-linux-x86_64.AppImage" >> $GITHUB_ENV
          else
            echo "LINUX_ARTIFACT_NAME=brainwash-main-v${{ env.VERSION }}-linux-x86_64.AppImage" >> $GITHUB_ENV
          fi

      - name: Upload Linux artefact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.LINUX_ARTIFACT_NAME }}
          path: src/dist/*.AppImage
          compression-level: 0

  build-windows:
    name: Build Windows Portable
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen --group build

      - name: Extract version from pyproject.toml
        shell: pwsh
        run: |
          $version = uv run python -c "import toml; print(toml.load('pyproject.toml')['project']['version'])"
          echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Output "Extracted version: $version"

      - name: Build with cx_Freeze
        working-directory: ./src
        run: uv run python build_with_cxfreeze_multiarch_setup.py build_exe
        shell: cmd

      - name: Find portable directory
        working-directory: ./src
        shell: pwsh
        run: |
          $exe_dir = Get-ChildItem -Recurse -Path build -Directory | Where-Object { Test-Path (Join-Path $_.FullName "brainwash.exe") } | Select-Object -ExpandProperty FullName -First 1
          if (-not $exe_dir) { Write-Error "Executable directory not found in build/"; exit 1 }
          $rel = $exe_dir.Substring("$env:GITHUB_WORKSPACE\".Length)
          Write-Output "EXE_DIR=$rel" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Set artifact name
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "ARTIFACT_NAME=brainwash-${{ github.ref_name }}-windows-portable" >> $GITHUB_ENV
          else
            echo "ARTIFACT_NAME=brainwash-main-v${{ env.VERSION }}-windows-portable" >> $GITHUB_ENV
          fi

      - name: Upload Windows artefact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.EXE_DIR }}
          compression-level: 6

  release:
    name: Create GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          python-version: "3.12"

      - name: Extract version from pyproject.toml
        run: |
          VERSION=$(uv run python -c "import toml; print(toml.load('pyproject.toml')['project']['version'])")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Extracted version: $VERSION"

      - name: Set artifact name
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "ARTIFACT_NAME=brainwash-${{ github.ref_name }}-windows-portable" >> $GITHUB_ENV
          else
            echo "ARTIFACT_NAME=brainwash-main-v${{ env.VERSION }}-windows-portable" >> $GITHUB_ENV
          fi

      - name: Set Linux artifact name
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "LINUX_ARTIFACT_NAME=brainwash-${{ github.ref_name }}-linux-x86_64.AppImage" >> $GITHUB_ENV
          else
            echo "LINUX_ARTIFACT_NAME=brainwash-main-v${{ env.VERSION }}-linux-x86_64.AppImage" >> $GITHUB_ENV
          fi

      - name: Download Linux artefact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.LINUX_ARTIFACT_NAME }}
          path: linux_dist

      - name: Download Windows artefact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: brainwash

      - name: Zip for release
        run: zip -r ${{ env.ARTIFACT_NAME }}.zip brainwash/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: |
            ${{ env.ARTIFACT_NAME }}.zip
            linux_dist/*.AppImage
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          generate_release_notes: true
          fail_on_unmatched_files: false
