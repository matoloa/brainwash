name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Portable
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen --group build

      - name: Build with cx_Freeze
        working-directory: ./src
        run: uv run python build_with_cxfreeze_multiarch_setup.py build_exe
        shell: cmd

      - name: Zip build directory
        working-directory: ./src
        shell: pwsh
        run: |
          $exe_dir = Get-ChildItem -Recurse -Path build -Directory | Where-Object { Test-Path (Join-Path $_.FullName "brainwash.exe") } | Select-Object -ExpandProperty FullName -First 1
          if (-not $exe_dir) { Write-Error "Executable directory not found in build/"; exit 1 }
          Compress-Archive -Path $exe_dir -DestinationPath "brainwash-windows-portable.zip"

      - name: Upload Windows artefact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: src/brainwash-windows-portable.zip
          compression-level: 0

  release:
    name: Create GitHub Release
    needs: [build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: artefacts
          merge-multiple: true

      - name: List artefacts (debug)
        run: ls -R artefacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: |
            artefacts/brainwash-windows-portable.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          generate_release_notes: true
          fail_on_unmatched_files: false
